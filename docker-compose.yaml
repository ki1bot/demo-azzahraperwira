services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "127.0.0.1:8080:80"
    environment:
      TZ: Asia/Jakarta
    volumes:
      - ./:/var/www/html
      - vendor_data:/var/www/html/vendor
      - ./.env.docker:/var/www/html/.env:ro
    depends_on:
      db:
        condition: service_healthy

  db:
    image: mysql:8.4
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: azzahra_perwira
      TZ: Asia/Jakarta
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_general_ci
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/01-create-local-user.sql:/docker-entrypoint-initdb.d/01-create-local-user.sql:ro
      - ./azzahraperwira.sql:/docker-entrypoint-initdb.d/02-azzahraperwira.sql:ro
    healthcheck:
      test:
        - CMD-SHELL
        - mysqladmin ping -h localhost -uroot -p$${MYSQL_ROOT_PASSWORD} --silent
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 30s

  phpmyadmin:
    image: phpmyadmin:5-apache
    restart: unless-stopped
    ports:
      - "127.0.0.1:8081:80"
    environment:
      PMA_HOST: db
      PMA_PORT: "3306"
      PMA_USER: root
      PMA_PASSWORD: root
      PMA_SSL: "1"
      PMA_SSL_VERIFY: "1"
      PMA_SSL_CA: /etc/phpmyadmin/ssl/ca.pem
      UPLOAD_LIMIT: 128M
      TZ: Asia/Jakarta
    volumes:
      - ./docker/mysql/certs/ca.pem:/etc/phpmyadmin/ssl/ca.pem:ro
    depends_on:
      db:
        condition: service_healthy

volumes:
  mysql_data:
  vendor_data:
